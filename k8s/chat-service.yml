apiVersion: apps/v1
kind: Deployment
metadata: 
  name: chat-service-dep
  namespace: hospital-ns
  labels:
    app: chat-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chat-service
  template:
    metadata:
      name: chat-service-pod
      labels:
        app: chat-service
    spec:
      containers:
        - name: chat-service-cont
          image: ebrahimmohammed/hospital-chat-service:latest
          ports:
            - containerPort: 4004
          env:
            - name: PORT
              value: 4004
            - name: DATABASE_URL
              valueFrom:
                ConfigMapKeyRef:
                  name: hospital-configMap
                  key: database-url
            - name: JWT_SECRET_KEY
              valueFrom:
                SecretKeyRef:
                  name: hospital-secret
                  key: jwt-secret-key
---
apiVersion: v1 
kind: Service
metadata:
  name: chat-service-srv 
  namespace: hospital-ns
spec:
  selector:
    app: chat-service
  ports:
    - port: 4004
      targetPort: 4004
  type: ClusterIP
